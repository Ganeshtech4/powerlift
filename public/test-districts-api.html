<!DOCTYPE html>
<html>
<head>
    <title>District API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .status { padding: 20px; margin: 20px 0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .district { padding: 10px; margin: 10px 0; background: #f8f9fa; border-left: 4px solid #007bff; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 15px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Districts API Test Page</h1>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="result"></div>

    <script>
        const API_URL = 'http://localhost:8000/api/v1';

        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="status">Testing connection...</div>';

            try {
                console.log('Fetching from:', `${API_URL}/districts/`);
                
                const response = await fetch(`${API_URL}/districts/`);
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Data received:', data);

                resultDiv.innerHTML = `
                    <div class="status success">
                        <h3>✅ API Connection Successful!</h3>
                        <p><strong>Total Districts Found:</strong> ${data.length}</p>
                        <p><strong>API URL:</strong> ${API_URL}/districts/</p>
                    </div>
                    <h3>Districts List:</h3>
                    ${data.slice(0, 5).map(d => `
                        <div class="district">
                            <strong>${d.name}</strong><br>
                            Status: ${d.is_available ? '🟠 Available' : '🟢 Assigned'}<br>
                            ID: ${d.id}
                        </div>
                    `).join('')}
                    ${data.length > 5 ? `<p><em>... and ${data.length - 5} more districts</em></p>` : ''}
                    <h3>Full JSON Response (first 3):</h3>
                    <pre>${JSON.stringify(data.slice(0, 3), null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <div class="status error">
                        <h3>❌ API Connection Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>API URL:</strong> ${API_URL}/districts/</p>
                        <h4>Possible Issues:</h4>
                        <ul>
                            <li>Backend not running on port 8000</li>
                            <li>CORS not configured for localhost:3000</li>
                            <li>Network error or firewall blocking</li>
                        </ul>
                        <p>Check browser console (F12) for detailed error.</p>
                    </div>
                `;
            }
        }

        // Auto-test on page load
        window.onload = () => {
            testAPI();
        };
    </script>
</body>
</html>

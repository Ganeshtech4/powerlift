name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false  # Treat warnings as warnings, not errors

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Test Server Connection
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "🔌 Testing server connectivity..."
          ping -c 3 $SERVER_HOST || echo "⚠️ Server ping failed, but continuing..."
          
      - name: Deploy to Production Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "📦 Deploying to production server..."
          echo "🎯 Target: $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH"
          
          # Deploy static files
          echo "📤 Uploading static files..."
          sshpass -e scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -r build/static "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/" || {
            echo "❌ Failed to upload static files - check server connectivity"
            exit 1
          }
          
          # Deploy images folder
          echo "📤 Uploading images..."
          sshpass -e scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -r build/images "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/" || {
            echo "❌ Failed to upload images"
            exit 1
          }
          
          # Deploy root files (index.html, manifest, etc.)
          echo "📤 Uploading root files..."
          sshpass -e scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 build/index.html build/asset-manifest.json build/manifest.json build/robots.txt "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/" 2>/dev/null || true
          
          # Deploy favicon and icons
          echo "📤 Uploading icons..."
          sshpass -e scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 build/*.png build/*.ico "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/" 2>/dev/null || true
          
          # Clean up old bundles (keep only latest)
          echo "🧹 Cleaning up old bundles..."
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$SERVER_USER@$SERVER_HOST" << 'CLEANUP'
          cd $DEPLOY_PATH/static/js 2>/dev/null || exit 0
          # Keep only the latest main.*.js and delete others
          ls -t main.*.js 2>/dev/null | tail -n +2 | xargs -r rm -f
          ls -t main.*.js.map 2>/dev/null | tail -n +2 | xargs -r rm -f
          ls -t main.*.js.LICENSE.txt 2>/dev/null | tail -n +2 | xargs -r rm -f
          
          cd ../css 2>/dev/null || exit 0
          # Keep only the latest main.*.css and delete others
          ls -t main.*.css 2>/dev/null | tail -n +2 | xargs -r rm -f
          ls -t main.*.css.map 2>/dev/null | tail -n +2 | xargs -r rm -f
          
          echo "✅ Cleanup completed"
          CLEANUP
          
          echo "✅ Deployment completed successfully!"

      - name: Verify Deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "🔍 Verifying deployment..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << EOF
          if [ -f "$DEPLOY_PATH/index.html" ]; then
            echo "✅ index.html exists"
            echo "📊 Current bundle files:"
            ls -lh "$DEPLOY_PATH/static/js/main.*.js" 2>/dev/null || echo "No main JS bundle found"
            ls -lh "$DEPLOY_PATH/static/css/main.*.css" 2>/dev/null || echo "No main CSS bundle found"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi
          EOF

      - name: Deploy Backend
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "🐍 Deploying backend to production server..."

          # Upload backend files via scp
          echo "📤 Uploading backend files..."
          sshpass -e scp -o StrictHostKeyChecking=no -r blog-backend/app "$SERVER_USER@$SERVER_HOST:/var/www/rekhapowerlift/backend/"
          sshpass -e scp -o StrictHostKeyChecking=no blog-backend/main.py blog-backend/requirements.txt "$SERVER_USER@$SERVER_HOST:/var/www/rekhapowerlift/backend/"

          # Install deps and restart backend process
          echo "📦 Installing dependencies and restarting backend..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << 'BACKEND'
          set -e
          cd /var/www/rekhapowerlift/backend
          echo "📦 Installing/updating Python dependencies..."
          source venv/bin/activate
          pip install -r requirements.txt --quiet

          echo "🔄 Stopping existing backend process..."
          # Force-kill any process on port 8000
          fuser -k 8000/tcp || true
          pkill -f "uvicorn main:app" || true
          sleep 3

          echo "🚀 Starting backend..."
          nohup venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > /var/log/rekhapowerlift-backend.log 2>&1 &
          echo "Backend started with PID $!"
          disown

          echo "✅ Backend deployment completed!"
          BACKEND

          echo "⏳ Waiting for backend to start..."
          sleep 8

          echo "🔍 Verifying backend..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << 'VERIFY'
          if pgrep -f "uvicorn main:app" > /dev/null; then
            echo "✅ uvicorn process is running (PID: $(pgrep -f 'uvicorn main:app'))"
          elif ss -tlnp | grep -q ':8000'; then
            echo "✅ Something is listening on port 8000"
          else
            echo "❌ Backend is not running"
            echo "Last log lines:"
            tail -20 /var/log/rekhapowerlift-backend.log 2>/dev/null || echo "No log file found"
            exit 1
          fi
          VERIFY

      - name: Deployment Summary
        if: success()
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** ${{ secrets.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** React production build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** /var/www/rekhapowerlift/backend" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** rekhapowerlift-backend (restarted)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY

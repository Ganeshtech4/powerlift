name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false  # Treat warnings as warnings, not errors

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to Production Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "📦 Deploying to production server..."
          
          # Deploy static files
          echo "📤 Uploading static files..."
          sshpass -e scp -o StrictHostKeyChecking=no -r build/static "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"
          
          # Deploy images folder
          echo "📤 Uploading images..."
          sshpass -e scp -o StrictHostKeyChecking=no -r build/images "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"
          
          # Deploy root files (index.html, manifest, etc.)
          echo "📤 Uploading root files..."
          sshpass -e scp -o StrictHostKeyChecking=no build/index.html build/asset-manifest.json build/manifest.json build/robots.txt "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/" 2>/dev/null || true
          
          # Deploy favicon and icons
          echo "📤 Uploading icons..."
          sshpass -e scp -o StrictHostKeyChecking=no build/*.png build/*.ico "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/" 2>/dev/null || true
          
          # Clean up old bundles (keep only latest)
          echo "🧹 Cleaning up old bundles..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << 'CLEANUP'
          cd $DEPLOY_PATH/static/js
          # Keep only the latest main.*.js and delete others
          ls -t main.*.js | tail -n +2 | xargs -r rm -f
          ls -t main.*.js.map | tail -n +2 | xargs -r rm -f
          ls -t main.*.js.LICENSE.txt | tail -n +2 | xargs -r rm -f
          
          cd ../css
          # Keep only the latest main.*.css and delete others
          ls -t main.*.css | tail -n +2 | xargs -r rm -f
          ls -t main.*.css.map | tail -n +2 | xargs -r rm -f
          
          echo "✅ Cleanup completed"
          CLEANUP
          
          echo "✅ Deployment completed successfully!"

      - name: Verify Deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "🔍 Verifying deployment..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << EOF
          if [ -f "$DEPLOY_PATH/index.html" ]; then
            echo "✅ index.html exists"
            echo "📊 Current bundle files:"
            ls -lh "$DEPLOY_PATH/static/js/main.*.js" 2>/dev/null || echo "No main JS bundle found"
            ls -lh "$DEPLOY_PATH/static/css/main.*.css" 2>/dev/null || echo "No main CSS bundle found"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi
          EOF

      - name: Deploy Backend
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "🐍 Deploying backend to production server..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << 'BACKEND'
          set -e
          
          echo "📂 Navigating to backend directory..."
          cd /var/www/rekhapowerlift/backend
          
          echo "📥 Pulling latest backend code..."
          git pull origin main
          
          echo "📦 Installing/updating Python dependencies..."
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          
          echo "🔄 Restarting backend service..."
          sudo systemctl restart rekhapowerlift-backend
          
          echo "✅ Backend deployment completed!"
          BACKEND
          
          echo "⏳ Waiting for backend to start..."
          sleep 5
          
          echo "🔍 Verifying backend service..."
          sshpass -e ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << 'VERIFY'
          if systemctl is-active --quiet rekhapowerlift-backend; then
            echo "✅ Backend service is running"
          else
            echo "❌ Backend service failed to start"
            sudo systemctl status rekhapowerlift-backend
            exit 1
          fi
          VERIFY

      - name: Deployment Summary
        if: success()
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** ${{ secrets.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** React production build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** /var/www/rekhapowerlift/backend" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** rekhapowerlift-backend (restarted)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
